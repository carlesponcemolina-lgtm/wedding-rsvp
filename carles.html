<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carles & Estefania</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Questrial&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
    }
    h1 {
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* Toggle button */
    .nav__toggle {
      position: fixed; top: 1.8rem; right: 3.5rem;
      display: flex; align-items: center;
      background: none; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 0.35rem 0.2rem;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 0.08em; color: #fff;
      width: 160px; height: 32px;
      position: fixed; overflow: hidden;
    }
    .nav__toggle:hover { border-color: rgba(255,255,255,0.4); }
    .nav__toggle-option {
      flex: 1; text-align: center; z-index: 1;
      padding: 0.15rem 0; transition: color 0.3s;
      user-select: none;
    }
    .nav__toggle-option.active { color: #0a0a0a; }
    .nav__toggle-pill {
      position: absolute; top: 3px; right: 3px;
      width: calc(50% - 3px); height: calc(100% - 6px);
      background: #fff; border-radius: 16px;
      transition: transform 0.35s ease;
    }
    .nav__toggle.estefania .nav__toggle-pill {
      transform: translateX(-100%);
    }
  </style>
</head>
<body>
  <button class="nav__toggle" id="versionToggle" onclick="toggleVersion()">
    <div class="nav__toggle-pill"></div>
    <span class="nav__toggle-option" data-v="estefania">Estefania</span>
    <span class="nav__toggle-option active" data-v="carles">Carles</span>
  </button>

  <h1>Vienes?</h1>

  <img src="matrix.png" alt="" style="width:clamp(200px, 30vw, 350px); height:auto; margin:2rem 0;">

  <div style="display:flex; gap:3rem;">
    <a href="index.html#rsvp" style="font-size:clamp(1.5rem,4vw,2.5rem); font-weight:300; letter-spacing:0.15em; text-transform:uppercase; color:#fff; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.3); padding-bottom:4px; transition:opacity 0.3s;" onmouseover="this.style.opacity='0.5'" onmouseout="this.style.opacity='1'">Si</a>
    <a href="index.html#rsvp" style="font-size:clamp(1.5rem,4vw,2.5rem); font-weight:300; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.3); text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:4px; transition:opacity 0.3s;" onmouseover="this.style.opacity='0.5'" onmouseout="this.style.opacity='1'">No</a>
  </div>

  <script>
    function toggleVersion() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
